# Redirects the "New issue" picker beyond the bug/feature templates.
# Discussions are for questions and ideas that don't yet warrant an issue.
blank_issues_enabled: false
contact_links:
  - name: Question or discussion
    url: https://github.com/Syphys/maestria/discussions
    about: Ask "how do I do X?" or float an idea — issues are for confirmed bugs and feature requests.
  - name: Security vulnerability
    url: https://github.com/Syphys/maestria/security/advisories/new
    about: Private vulnerability reporting — do NOT open a public issue for security findings. See SECURITY.md.
