<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="SALT" height="301px" preserveAspectRatio="none" style="width:327px;height:301px;background:#FFFFFF;" version="1.1" viewBox="0 0 327 301" width="327px" zoomAndPan="magnify"><?plantuml 1.2026.4?><defs/><g><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="700" lengthAdjust="spacing" textLength="170.748" x="7" y="19.9492">Caract&#233;riser tous les mod&#232;les</text><line style="stroke:#AAAAAA;stroke-width:1;" x1="6" x2="321.8555" y1="29.4609" y2="29.4609"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="34.6699" x="27" y="47.9102">Forcer</text><rect fill="none" height="10" style="stroke:#000000;stroke-width:1.5;" width="10" x="9" y="37.9414"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="77.0098" x="7" y="67.8711">[&#10003;] Parler libre</text><rect fill="#EEEEEE" height="19.9609" rx="5" ry="5" style="stroke:#000000;stroke-width:2.5;" width="172" x="88.5098" y="57.4219"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="143.6777" x="102.6709" y="72.3711">&#9654; TOUT CARACT&#201;RISER</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="109.3828" x="27" y="96.832">Sans calcul vectoriel</text><rect fill="none" height="10" style="stroke:#000000;stroke-width:1.5;" width="10" x="9" y="86.8633"/><rect fill="#EEEEEE" height="19.9609" rx="5" ry="5" style="stroke:#000000;stroke-width:2.5;" width="172" x="140.8828" y="86.3828"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="119.1914" x="167.2871" y="101.332">&#10067; Questions sources</text><line style="stroke:#AAAAAA;stroke-width:1;" x1="6" x2="321.8555" y1="115.3438" y2="115.3438"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="280.8398" x="7" y="133.793">Mod&#232;le 12/52 &#8212; qwen-coder-32b.gguf &#183; 47 effectu&#233;s</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="173.6777" x="7" y="153.7539">&#9607;&#9607;&#9607;&#9607;&#9607;&#9607;&#9607;&#9606;&#9601;&#9601;&#9601;&#9601;&#9601; 60%</text><line style="stroke:#AAAAAA;stroke-width:1;" x1="6" x2="321.8555" y1="163.2656" y2="163.2656"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="64.6699" x="7" y="181.7148">( Erreurs (3)</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="69.3691" x="73.6699" y="181.7148">Logs serveur</text><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="700" lengthAdjust="spacing" textLength="68.0156" x="145.0391" y="181.7148">Interactions</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="3.9961" x="216.3887" y="181.7148">)</text><rect fill="#EEEEEE" height="19.9609" rx="5" ry="5" style="stroke:#000000;stroke-width:2.5;" width="92" x="224.8848" y="171.2656"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="55.1602" x="243.3047" y="186.2148">&#128203; Copier</text><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="176.0859" x="7" y="210.6758">scrollable tab body, infinite scroll,</text><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="240.7969" x="7" y="230.6367">polling pauses while a text selection is active,</text><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="258.1289" x="7" y="250.5977">auto-scroll to bottom on tab switch (2026-05-24),</text><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="312.8555" x="7" y="270.5586">each prompt_done event pushes a full DiagnosticRunEntry</text><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="285.4863" x="7" y="290.5195">(&#171; Interactions &#187; is live during a run, no signature poll)</text><?plantuml-src bPDFQnD16CRl-HJFHKWWcwRRj5v2Q8aH2egQnbC9ChkPR8PEPjRvarZQW5uKyHZ9IV5gyQu7RyatoIVm8_Xkbf2rAkBB77PdPtxpFCyxUsmTCyuowJ3MyOLFWyZBYo1bYilILGcuQaQjDZCiTgiR8omtSDfRI6vfms3rcHwQUr4BVwiPCO8W0-4SVTpN9YR6hRh6FskM8zOVvdqyPaOIH8h8y2Ba7El5L_GUFUsXVT8zQVTMRxkdPvqkdNiBGpDdJ5d4JCPUOi9ZfutWCeTydEE9vzO9JKkizYJPxXWxHqtHUfXdWFrmxp34-kLxF9zo5SHwm4rm44Qr9F53BB-XSHTyEAHp_Eg64XEjefxruisVnklrubLnuAX-1_zHXUpBw1Z3lR4e7rJ8vGETa3Lk9ZH7hzJaK-LurkRCzAQZbKqOFpxDtw6jKq61ztEvPDl6Hal98dBkM8H83owh46eeb70S-TVgpkNldIH6Ick4If0oRodVwKWGZS7n5uwKIRwH0c6HYPhmNt1R1lDE1_bnT2z9XtDw3DgMgR9JuU8Hoc4zF0hgXq7Og1GXMmPdj2WrUfowPmEjEFY4AuVKsn79OXXwWjyJB56QhaJSzQgZdBdSaBQCyl8BYW5Y-JrJBaat1jvaDXcCLrKe3IiInPodkvj5KCb0izAiTCpL8FiHIwNzMYQvrlW9?></g></svg>